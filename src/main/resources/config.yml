# PassiveHunger Configuration

# Enable or disable the hunger depletion logic
enabled: true

# The time (in seconds) it takes to fully deplete 20 hunger and 20 saturation (total 40 points)
# starting from maximum capacity.
# Default: 1200.0 seconds (20 minutes). This yields a rate of 1 point every 30 seconds.
total-depletion-time-seconds: 1200.0

# Exclude players in Creative or Spectator mode from passive hunger depletion
exclude-creative-spectator: true

# Exclude players in worlds set to Peaceful difficulty
exclude-peaceful: true

# Exclude players who have the "passivehunger.bypass" permission
exclude-bypass-permission: true

# The minimum food level (0 to 20) required for passive hunger to apply.
# If a player's food level falls below this value, passive hunger will stop depleting their food.
# Default: 0 (depletes all the way to 0 hunger)
min-food-threshold: 0

